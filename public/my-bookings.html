<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evilazio Barbershop | Meus Agendamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body class="landing-mode">
    <main class="container admin-container">
      <header class="topbar card">
        <div>
          <h1 class="topbar-title">Meus Agendamentos</h1>
          <p class="topbar-subtitle">Acompanhe seus horarios marcados na barbearia.</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" type="button" class="outline-btn">Atualizar</button>
          <button id="backBtn" type="button" class="outline-btn">Voltar</button>
        </div>
      </header>

      <section class="card booking-summary">
        <article class="summary-chip">
          <span class="summary-label">Total</span>
          <strong id="summaryTotal">0</strong>
        </article>
        <article class="summary-chip">
          <span class="summary-label">Confirmados</span>
          <strong id="summaryConfirmed">0</strong>
        </article>
        <article class="summary-chip">
          <span class="summary-label">Cancelados</span>
          <strong id="summaryCancelled">0</strong>
        </article>
      </section>

      <section class="card">
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Horario</th>
                <th>Servico</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="myBookingsRows"></tbody>
          </table>
        </div>

        <div id="myBookingsEmpty" class="empty-state hidden">
          <h2>Nenhum agendamento encontrado</h2>
          <p>Assim que voce marcar um horario, ele vai aparecer aqui.</p>
        </div>

        <p id="myBookingsFeedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script src="my-bookings.js"></script>
  </body>
</html>
