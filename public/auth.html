<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evilazio Barbershop</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        .auth-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: white;
        }

        .auth-branding {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .auth-branding h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .auth-branding p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 400px;
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .auth-form h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: #1a1a1a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #d4a574 0%, #c4915a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .auth-toggle p {
            color: #666;
            margin-bottom: 10px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px 20px;
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #eee;
            border-color: #d4a574;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1024px) {
            .auth-container {
                flex-direction: column;
            }

            .auth-branding {
                display: none;
            }

            .auth-panel {
                background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            }

            .auth-form-wrapper {
                background: white;
                padding: 40px;
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-branding">
            <h1>Evilazio</h1>
            <p>A melhor barbearia da região. Agende seu corte agora!</p>
        </div>

        <div class="auth-panel">
            <div class="auth-form-wrapper">
                <!-- Login Form -->
                <form id="loginForm" class="auth-form" style="display: none;">
                    <h2>Entrar</h2>

                    <div id="loginError" class="error-message" style="display: none;"></div>

                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>

                    <div class="auth-toggle">
                        <p>Não tem uma conta?</p>
                        <button type="button" class="btn-secondary" onclick="toggleForm()">Criar Conta</button>
                    </div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <h2>Criar Conta</h2>

                    <div id="registerError" class="error-message" style="display: none;"></div>
                    <div id="registerSuccess" class="success-message" style="display: none;"></div>

                    <div class="form-group">
                        <label for="registerName">Nome Completo</label>
                        <input type="text" id="registerName" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPhone">Telefone</label>
                        <input type="tel" id="registerPhone" name="phone" placeholder="(85) 9 9999-9999" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Senha (mínimo 8 caracteres)</label>
                        <input type="password" id="registerPassword" name="password" minlength="8" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPasswordConfirm">Confirmar Senha</label>
                        <input type="password" id="registerPasswordConfirm" name="passwordConfirm" minlength="8"
                            required>
                    </div>

                    <button type="submit" class="btn-primary">Criar Conta</button>

                    <div class="auth-toggle">
                        <p>Já tem uma conta?</p>
                        <button type="button" class="btn-secondary" onclick="toggleForm()">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function toggleForm() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
            registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'As senhas não coincidem.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name, phone })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erro ao registrar');
                }

                successDiv.textContent = 'Cadastro realizado! Você será redirecionado em 3 segundos...';
                successDiv.style.display = 'block';

                setTimeout(() => {
                    toggleForm();
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').focus();
                }, 3000);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const button = e.target.querySelector('button[type="submit"]');

            errorDiv.style.display = 'none';

            button.classList.add('loading');
            button.innerHTML = '<span class="spinner"></span> Entrando...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erro ao fazer login');
                }

                // Store token
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to dashboard or home
                window.location.href = data.user.role === 'admin' ? '/admin.html' : '/booking.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                button.classList.remove('loading');
                button.innerHTML = 'Entrar';
            }
        });

        // Show login form by default
        window.addEventListener('load', () => {
            document.getElementById('loginForm').style.display = 'block';
        });
    </script>
</body>

</html>
