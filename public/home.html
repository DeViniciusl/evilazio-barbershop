<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evilazio Barbershop | Inicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="topbar card">
        <div>
          <h1 class="topbar-title">Evilazio Barbershop</h1>
          <p id="welcomeText" class="topbar-subtitle">Bem-vindo.</p>
        </div>
        <div class="topbar-actions">
          <button id="accountBtn" type="button" class="outline-btn">Minha conta</button>
          <button id="myBookingsBtn" type="button" class="outline-btn">Meus agendamentos</button>
          <button id="logoutBtn" type="button" class="outline-btn">Sair</button>
        </div>
      </header>

      <section class="card">
        <h2>Agendamento</h2>

        <div class="form">
          <label>
            Servico
            <select id="serviceSelect" required>
              <option value="">Selecione</option>
              <option value="Corte Social">Corte Social</option>
              <option value="Corte Degrade">Corte Degradê</option>
              <option value="Corte Navalhado">Corte Navalhado</option>
              <option value="Barba">Barba</option>
              <option value="Sobrancelha">Sobrancelha</option>
              <option value="Pézinho">Pézinho</option>
              <option value="Corte + barba">Corte + barba</option>
              <option value="Corte + barba + sobrancelha">Corte + Barba + Sobrancelha</option>

            </select>
          </label>
          <p id="serviceDurationInfo" class="section-label"></p>

          <label>
            Telefone
            <input id="phoneInput" type="tel" minlength="8" maxlength="25" autocomplete="tel" required />
          </label>

          <label>
            Dia do corte
            <select id="daySelect" required></select>
          </label>

          <div>
            <p class="section-label">Horarios (08h - 19h)</p>
            <div id="slotGrid" class="slot-grid"></div>
          </div>

          <button id="bookingBtn" type="button">Confirmar Agendamento</button>
          <p id="feedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>

      <footer class="card">
        <p class="section-label">💬 Pagamento será feito presencialmente no local</p>
      </footer>
    </main>

    <script src="home.js"></script>
  </body>
</html>
