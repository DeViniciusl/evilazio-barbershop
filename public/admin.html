<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evilazio Barbershop | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body class="landing-mode">
    <main class="container admin-container">
      <header class="topbar card">
        <div>
          <h1 class="topbar-title">Painel Admin</h1>
          <p class="topbar-subtitle">Planilha de agendamentos (08h - 19h)</p>
        </div>
        <button id="backBtn" type="button" class="outline-btn">Voltar</button>
      </header>

      <section class="card">
        <div class="admin-controls">
          <label>
            Dia
            <select id="daySelect"></select>
          </label>
        </div>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Horario</th>
                <th>Status</th>
                <th>Cliente</th>
                <th>Servico</th>
                <th>Tempo medio</th>
                <th>Telefone</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="adminRows"></tbody>
          </table>
        </div>

        <p id="adminFeedback" class="feedback" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Gerenciar Dias Fechados</h2>
        <div class="admin-controls">
          <label>
            Dia para fechar
            <select id="closedDaySelect"></select>
          </label>
          <label>
            Motivo (opcional)
            <input id="closedDayReason" type="text" placeholder="Ex: Saúde, Férias" />
          </label>
          <button id="addClosedDayBtn" type="button">Marcar como fechado</button>
        </div>

        <div>
          <h3>Dias Fechados</h3>
          <div id="closedDaysList" class="closed-days-list"></div>
          <p id="closedDaysEmpty" class="section-label">Nenhum dia marcado como fechado.</p>
          <p id="closedDaysFeedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>

      <section class="card">
        <h2>Gerenciar Planos VIP</h2>
        <div class="admin-controls">
          <label>
            Username do cliente
            <input id="vipUsernameInput" type="text" placeholder="Digite o username único do cliente" />
          </label>
          <button id="assignVipBtn" type="button">Atribuir plano VIP</button>
        </div>

        <div id="vipFeedback" class="feedback" aria-live="polite"></div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
